name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.0)'
        required: true

# Needed so the workflow can create/edit GitHub Releases and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon
          - os: macos-15
            build_args: --mac --arm64
          # Intel Mac
          - os: macos-13
            build_args: --mac --x64
          # Windows
          - os: windows-latest
            build_args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      # electron-builder depends on app-builder-bin, whose pre-compiled binary is
      # platform-specific. Installing electron-builder locally inside desktop/ ensures
      # Node's module resolution finds the correct platform binary from desktop/node_modules
      # instead of the workspace-hoisted copy in the root (which may have the wrong arch).
      - name: Install electron-builder locally in desktop
        run: npm install --save-dev electron-builder
        working-directory: desktop

      - name: Build & publish
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Distributes as unsigned DMG — users must right-click → Open on first launch.
          # To enable notarization, add CSC_LINK, CSC_KEY_PASSWORD and
          # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-vite build && npx electron-builder ${{ matrix.build_args }} --publish always
