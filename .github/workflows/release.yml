name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15        # Apple Silicon
            build_args: --mac --arm64
          - os: windows-latest
            build_args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Detach desktop/ from the npm workspace before installing. The root
      # package.json declares workspaces:[desktop, server], which causes
      # `npm install` to hoist app-builder-bin into the root node_modules.
      # Its per-arch native binaries are wired via optionalDependencies and
      # don't get resolved reliably under workspace hoisting on macOS/Windows
      # runners — electron-builder then fails with:
      #   spawn .../node_modules/app-builder-bin/mac/app-builder_arm64 ENOENT
      # Renaming the root manifest makes npm treat desktop/ as a standalone
      # project, so deps install into desktop/node_modules with correct arch.
      - name: Detach desktop from npm workspace
        shell: bash
        run: mv package.json _package.workspace.json

      - name: Install desktop dependencies
        working-directory: desktop
        shell: bash
        run: npm install --include=optional --no-audit --no-fund

      - name: Build renderer & main bundles
        working-directory: desktop
        shell: bash
        run: npx electron-vite build

      - name: Verify app-builder binary is present
        working-directory: desktop
        shell: bash
        run: |
          echo "app-builder-bin contents:"
          ls -laR node_modules/app-builder-bin || (echo "app-builder-bin not installed" && exit 1)

      - name: Package & publish
        working-directory: desktop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Distributes unsigned. Users right-click → Open on first macOS launch.
          # To sign/notarize: add CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
          # APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID secrets and drop this line.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder ${{ matrix.build_args }} --publish always
